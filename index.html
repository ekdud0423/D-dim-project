<style>
  /* --- 1. 폰트 등록 (SB 어그로) --- */
  @font-face {
      font-family: 'SBAggro';
      src: url('./SB 어그로 L.ttf') format('truetype');
      font-weight: 300;
  }
  @font-face {
      font-family: 'SBAggro';
      src: url('./SB 어그로 M.ttf') format('truetype');
      font-weight: 500;
  }
  @font-face {
      font-family: 'SBAggro';
      src: url('./SB 어그로 B.ttf') format('truetype');
      font-weight: 700;
  }

  :root {
    --deep-navy: #28246B;
    --hero-purple: #4b3c8a;
    --bg-gray: #f4f4f4;
    --gallery-blue: #7fa0c4;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    margin: 0;
    font-family: 'Pretendard', 'SBAggro', sans-serif;
    line-height: 1.6; /* 줄간격을 주어 가독성 향상 */
    word-break: keep-all; /* 한글 단어 끊김 방지 */
  }

  /* --- 공통 섹션 설정 (PC에서 옆으로 퍼지는 것 방지) --- */
  section {
    padding: 60px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center; /* 내부 요소 중앙 정렬 */
  }

  /* 섹션 내 실제 콘텐츠가 들어가는 박스 */
  .inner-content {
    width: 100%;
    max-width: 800px; /* PC에서 글이 옆으로 너무 퍼지지 않게 제한 */
    margin: 0 auto;
  }

  h2 {
    font-family: 'SBAggro', sans-serif;
    font-weight: 700;
    margin-bottom: 30px;
  }

  p {
    margin-bottom: 20px;
  }

  /* 1. 메인 (Hero) */
  .hero {
    background: var(--hero-purple);
    color: white;
    padding: 100px 20px;
  }
  .hero img {
    max-width: 100%;
    height: auto;
    margin-bottom: 20px;
  }

  /* 2. 소개 (Intro) */
  .intro {
    background: var(--bg-gray);
    position: relative;
  }
  .intro h2 { color: var(--deep-navy); }
  .big-text {
    font-size: 1.5rem;
    margin-top: 30px;
  }

  /* 3. 혜택 (Benefit) */
  .benefit {
    background: var(--hero-purple);
    color: white;
  }
  #my-table {
    width: 100%;
    max-width: 500px; /* 표 이미지가 너무 커지지 않게 */
    height: auto;
    margin: 20px auto;
    border-radius: 10px;
  }
  #table-info {
    font-size: 14px;
    color: #ddd;
    margin-top: 15px;
  }

  /* 4. 극단 소개 */
  .about {
    background: #3b2e6e;
    color: white;
  }

  /* 5. 갤러리 */
  .gallery { background: var(--gallery-blue); }
  .gallery .box-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* PC에선 옆으로, 모바일에선 세로로 */
    gap: 20px;
    width: 100%;
    max-width: 1000px;
    margin-top: 30px;
  }
  .gallery .box {
    background: rgba(255,255,255,0.2);
    padding: 50px 20px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
  }

  /* 6. SNS & 7. 후원자 */
  .sns { background: #6b8bb1; color: white; }
  .supporters { background: #eee; }
  .small-gray { color: #888; font-size: 12px; }

  /* --- 하단 로고 이미지 --- */
  #bottom-logo {
    position: absolute;
    bottom: 20px;
    right: 20px;
    width: 60px;
    opacity: 0.6;
  }

  /* 모바일 최적화 */
  @media (max-width: 768px) {
    section { padding: 40px 15px; }
    .big-text { font-size: 1.2rem; }
    .hero { padding: 60px 15px; }
  }
</style>
