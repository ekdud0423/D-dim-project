<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>디딤 프로젝트 후원</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #2f2c7a;
      color: white;
      text-align: center;
    }

    .section {
      padding: 60px 20px;
    }

    h1 {
      font-size: 32px;
    }

    p {
      line-height: 1.6;
      max-width: 500px;
      margin: 20px auto;
    }

    .button {
      display: inline-block;
      margin-top: 20px;
      padding: 15px 25px;
      background: white;
      color: #2f2c7a;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      margin: 20px auto;
      max-width: 400px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="section">
    <h1>디딤 프로젝트</h1>
    <p>디딤프로젝트의 새로운 시작, 함께 만들어주세요</p>
  </div>

  <div class="section">
    <p>
      디딤 프로젝트는 신인 연출가와 배우들이
      함께 성장하는 창작 단체입니다.
    </p>
  </div>

  <div class="section">
    <h2>후원하기</h2>

    <div class="box">
      <p>5만원 후원</p>
      <p>이름 기재</p>
    </div>

    <div class="box">
      <p>10만원 후원</p>
      <p>프로그램북 기재</p>
    </div>

    <div class="box">
      <p>20만원 후원</p>
      <p>VIP 초대</p>
    </div>

    <a class="button" href="#">후원 계좌 보기</a>
  </div>

  <div class="section">
    <h2>문의</h2>
    <p>010-0000-0000</p>
  </div>

</body>
</html>
